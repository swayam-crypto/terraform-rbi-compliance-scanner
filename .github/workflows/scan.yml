name: Compliance Scan and Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: python -m pytest tests/ -v

  scan:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install package
        run: pip install -e .

      - name: Demo — scan example with a known violation (informational only)
        run: rbi-scan --path ./examples/sample_infra --fail-on none

      - name: Gate — scan compliant infra (this MUST pass for the build to pass)
        run: rbi-scan --path ./examples/compliant_infra --fail-on critical